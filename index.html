<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: black;
  color: white;
  font-family: Arial, Helvetica, sans-serif;
}


header.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 50px;
  background-color: rgba(0, 0, 0, 0.8);
  position: fixed;
  width: 100%;
  top: 10;
  z-index: 10;
}

.logo {
  width: 100px;
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 20px;
}

.nav-links a {
  color: white;
  text-decoration: none;
  font-size: 16px;
}

.nav-links a:hover {
  text-decoration: underline;
}

.signin-btn {
  background-color: red;
  border: none;
  padding: 8px 16px;
  color: white;
  cursor: pointer;
  border-radius: 4px;
  font-weight: bold;
}

.signin-btn:hover {
  background-color: red;
}

.hero {
  height: 80vh;
  background: url('images/hero-bg.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding:  20px;
}

.hero-content {
  max-width: 600px;
}

.hero-content h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

.hero-content p {
  font-size: 1.2rem;
  margin-bottom: 20px;
}

.hero-buttons .btn {
  background-color: red;
  border: none;
  padding: 10px 20px;
  margin: 5px;
  font-size: 1rem;
  cursor: pointer;
  border-radius: 4px;
}

.hero-buttons .btn-light {
  background-color: white;
  color: black;
}

.hero-buttons .btn:hover {
  opacity: 0.8;
  transform: scale(1.05);
  transition: 0.3s ease;
}


.movies-section {
  padding: 100px 50px 50px;
}

.movies-section h2 {
  margin-bottom: 10px;
}

.movie-row {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding-bottom: 10px;
}

.movie-row img {
  width: 200px;
  border-radius: 8px;
  transition: transform 0.3s ease;
}

.movie-row img:hover {
  transform: scale(1.1);
}


footer {
  background-color: black;
  color: white;
  text-align: center;
  padding: 40px 20px;
  font-size: 0.9rem;
  margin-top: 50px;
}

.footer-links {
  margin: 20px 0;
}

.footer-links a {
  color: #999;
  text-decoration: none;
  margin: 0 10px;
}

.footer-links a:hover {
  text-decoration: underline;
}


    </style>
    
  <header class="navbar">
    <img src="N.png" class="logo" alt="Netflix Logo" />
    <nav>
      <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">TV Shows</a></li>
        <li><a href="#">Movies</a></li>
        <li><a href="#">My List</a></li>
      </ul>
    </nav>
    <button class="signin-btn">Sign In</button>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Unlimited movies, TV shows and more.</h1>
      <p>Watch anywhere. Cancel anytime.</p>
      <div class="hero-buttons">
        <button class="btn">Play</button>
        <button class="btn btn-light">More Info</button>
      </div>
    </div>
  </section>

 
  <section class="movies-section">
    <h2>Trending Now</h2>
    <div class="movie-row">
      <img src=" 1.png" alt="Movie 1" />
      <img src=" 2.png" alt="Movie 2" />
      <img src=" 3.png" alt="Movie 3" />
      <img src="4.png " alt="Movie 4" />
      <img src=" 5.png" alt="Movie 5" />
    </div>
  </section>

  <section class="movies-section">
    <h2>Popular on Netflix</h2>
    <div class="movie-row">
      <img src=" 6.png" alt="Movie 6" />
      <img src="7.png " alt="Movie 7" />
      <img src="8.png " alt="Movie 8" />
      <img src="9.png " alt="Movie 9" />
      <img src=" 10.png"alt="Movie 10" />
    </div>
  </section>
  

  
  <footer>
    <div class="footer-content">
      <p>Questions? Call 000-800-919-1694</p>
      <div class="footer-links">
        <a href="#">FAQ</a>
        <a href="#">Help Centre</a>
        <a href="#">Terms of Use</a>
        <a href="#">Privacy</a>
      </div>
      <p> 2025 Netflix Clone Project</p>
    </div>
  </footer>
</body>
</html>

<style> 

body {
  background: radial-gradient(circle at center, #2d0d0d 0%, #000 100%);
  min-height: 200vh;
}

.navbar {
  background: linear-gradient(to bottom, 
    rgba(0,0,0,0.95) 0%,
    rgba(229,9,20,0.3) 100%) !important;
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(229,9,20,0.2);
}

.logo {
  filter: drop-shadow(0 0 15px #e50914);
  transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
}

.logo:hover {
  transform: rotate(-8deg) scale(1.15);
}

.movie-row {
  perspective: 2000px;
  scroll-snap-type: x mandatory;
}

.movie-row img {
  transform-style: preserve-3d;
  transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
  scroll-snap-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.movie-row img:hover {
  transform: rotateY(-15deg) translateZ(50px) scale(1.2);
  z-index: 2;
}

.hero {
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, 
    rgba(229,9,20,0.1) 0%,
    rgba(229,9,20,0.05) 50%,
    rgba(0,0,0,0.8) 100%);
  animation: grain 8s steps(10) infinite;
}

@keyframes grain {
  0%, 100% { transform: translate(0, 0) }
  10% { transform: translate(-5%, -10%) }
  30% { transform: translate(3%, -15%) }
  50% { transform: translate(12%, 9%) }
  70% { transform: translate(9%, 4%) }
  90% { transform: translate(-1%, 7%) }
}

.signin-btn {
  background: linear-gradient(135deg, #e50914 0%, #b1060f 100%);
  position: relative;
  overflow: hidden;
}

.signin-btn::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg,
    transparent 25%,
    rgba(255,255,255,0.1) 50%,
    transparent 75%);
  animation: shine 3s infinite;
}

@keyframes shine {
  100% { transform: translateX(100%); }
}
</style>
